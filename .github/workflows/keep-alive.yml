name: Keep backend services warm

on:
  schedule:
    # Every 10 minutes. Free-tier hosts (Render/Railway) typically spin down
    # after ~15 minutes of inactivity, so this keeps them from sleeping.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -fsS -m 90 "https://idbi-wealth-advisor-backend.onrender.com/api/actuator/health" || true

      - name: Ping AI service health endpoint
        run: curl -fsS -m 90 "https://idbi-wealth-advisor-ai-service.onrender.com/health" || true
